name: clearfilters-16

services:
  db16:
    image: postgres:15
    container_name: clearfilters-pg-16
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "7416:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    restart: unless-stopped

  odoo16:
    build: .
    container_name: clearfilters-odoo-16
    depends_on:
      - db16
    ports:
      - "10416:8069"
    environment:
      HOST: db16
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo_data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons/no_clear_all_filters:/mnt/extra-addons/no_clear_all_filters
    restart: unless-stopped

volumes:
  postgres_data:
  odoo_data:
