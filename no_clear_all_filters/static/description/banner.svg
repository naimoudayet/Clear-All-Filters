<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#714B67"/>
      <stop offset="100%" stop-color="#5A3A52"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1280" height="640" fill="url(#bg)"/>

  <!-- Top accent stripe -->
  <rect x="0" y="0" width="1280" height="6" fill="#00A09D"/>

  <!-- Top-left module label -->
  <text x="100" y="98" fill="#94A3B8" font-size="14" font-weight="700" letter-spacing="3">ODOO MODULE</text>

  <!-- Title - line 1 (white) -->
  <text x="100" y="240" fill="#ffffff" font-size="92" font-weight="800" letter-spacing="-1">Clear All Filters.</text>

  <!-- Title - line 2 (orange accent word) -->
  <text x="100" y="340" fill="#FF7F4F" font-size="92" font-weight="800" letter-spacing="-1">One Click.</text>

  <!-- Subtitle - prominent -->
  <text x="100" y="412" fill="#ffffff" font-size="26" font-weight="500">Wipe every active filter, group-by, favorite, and search query at once.</text>

  <!-- Subtitle - muted -->
  <text x="100" y="450" fill="#BBA8B5" font-size="20" font-weight="400">A button next to the search bar. Pure frontend. Zero server impact.</text>

  <!-- Divider -->
  <line x1="100" y1="510" x2="1180" y2="510" stroke="#8A6A80" stroke-width="1" opacity="0.6"/>

  <!-- Bottom feature row -->
  <g font-size="16" font-weight="700" letter-spacing="2">
    <text x="100" y="560" fill="#ffffff">FILTERS</text>
    <text x="210" y="560" fill="#8A6A80">·</text>
    <text x="235" y="560" fill="#ffffff">GROUP-BYS</text>
    <text x="380" y="560" fill="#8A6A80">·</text>
    <text x="405" y="560" fill="#ffffff">FAVORITES</text>
    <text x="545" y="560" fill="#8A6A80">·</text>
    <text x="570" y="560" fill="#ffffff">SEARCH QUERY</text>
  </g>

  <!-- Bottom-right license / status -->
  <g font-size="16" font-weight="700" letter-spacing="2">
    <text x="1180" y="560" fill="#FF7F4F" text-anchor="end">LGPL-3 · ZERO CONFIG</text>
  </g>
</svg>
