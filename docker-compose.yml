name: clearfilters-19

services:
  db19:
    image: postgres:16
    container_name: clearfilters-pg-19
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "7419:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    restart: unless-stopped

  odoo19:
    build: .
    container_name: clearfilters-odoo-19
    depends_on:
      - db19
    ports:
      - "10419:8069"
    environment:
      HOST: db19
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo_data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons/no_clear_all_filters:/mnt/extra-addons/no_clear_all_filters
    restart: unless-stopped

volumes:
  postgres_data:
  odoo_data:
