version: "3.8"

services:
  db19:
    image: postgres:16
    container_name: postgres19_clear_all_filters
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "7419:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    restart: unless-stopped

  odoo19:
    image: odoo:19.0
    container_name: odoo19_clear_all_filters
    depends_on:
      - db19
    ports:
      - "10419:8069"
    volumes:
      - odoo_data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    restart: unless-stopped

volumes:
  postgres_data:
  odoo_data:
